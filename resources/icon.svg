<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a1e4a"/>
      <stop offset="100%" stop-color="#0a0812"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9070e0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9070e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c8a0ff"/>
      <stop offset="60%" stop-color="#7040c0"/>
      <stop offset="100%" stop-color="#3a1870"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c89030"/>
      <stop offset="100%" stop-color="#e8c050"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="#6040a0" stroke-width="1" opacity="0.4"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#8060c0" stroke-width="0.5" opacity="0.3"/>

  <!-- Ambient glow behind gem -->
  <ellipse cx="128" cy="115" rx="60" ry="55" fill="url(#glow)" opacity="0.5"/>

  <!-- Outer octagon frame (rune border) -->
  <polygon
    points="128,28 178,45 210,83 210,173 178,211 128,228 78,211 46,173 46,83 78,45"
    fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.8"
    filter="url(#softGlow)"/>

  <!-- Inner decorative ring -->
  <polygon
    points="128,42 172,57 200,90 200,166 172,199 128,214 84,199 56,166 56,90 84,57"
    fill="none" stroke="#c89030" stroke-width="1" opacity="0.35"/>

  <!-- Corner rune marks -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7">
    <line x1="46" y1="83" x2="56" y2="90"/>
    <line x1="78" y1="45" x2="84" y2="57"/>
    <line x1="210" y1="83" x2="200" y2="90"/>
    <line x1="178" y1="45" x2="172" y2="57"/>
    <line x1="46" y1="173" x2="56" y2="166"/>
    <line x1="78" y1="211" x2="84" y2="199"/>
    <line x1="210" y1="173" x2="200" y2="166"/>
    <line x1="178" y1="211" x2="172" y2="199"/>
  </g>

  <!-- Dragon silhouette — stylized, small at top -->
  <g opacity="0.55" fill="#c89030" filter="url(#softGlow)">
    <!-- Body -->
    <path d="M98 72 Q110 60 128 58 Q146 60 158 72 Q165 82 162 92 Q155 88 148 90 Q140 85 128 84 Q116 85 108 90 Q101 88 94 92 Q91 82 98 72z"/>
    <!-- Left wing -->
    <path d="M94 92 Q80 78 68 72 Q72 82 70 92 Q78 88 86 94z" opacity="0.7"/>
    <!-- Right wing -->
    <path d="M162 92 Q176 78 188 72 Q184 82 186 92 Q178 88 170 94z" opacity="0.7"/>
    <!-- Head -->
    <path d="M115 62 Q128 50 141 62 Q138 56 128 54 Q118 56 115 62z"/>
    <!-- Horn left -->
    <path d="M118 56 L112 44 L120 52z"/>
    <!-- Horn right -->
    <path d="M138 56 L144 44 L136 52z"/>
  </g>

  <!-- Central gem - large faceted jewel -->
  <g filter="url(#strongGlow)">
    <!-- Gem shadow/base -->
    <polygon points="128,102 162,120 162,152 128,170 94,152 94,120"
      fill="#1a0840" opacity="0.6"/>
    <!-- Main gem faces -->
    <polygon points="128,102 162,120 162,152 128,170 94,152 94,120"
      fill="url(#gemGlow)"/>
    <!-- Gem facets - light faces -->
    <polygon points="128,102 162,120 128,136" fill="#d0a8ff" opacity="0.4"/>
    <polygon points="128,102 94,120 128,136" fill="#9060d0" opacity="0.3"/>
    <!-- Gem facets - dark faces -->
    <polygon points="128,170 162,152 128,136" fill="#5030a0" opacity="0.5"/>
    <polygon points="128,170 94,152 128,136" fill="#6840b8" opacity="0.4"/>
    <!-- Gem highlight -->
    <ellipse cx="118" cy="118" rx="10" ry="7" fill="white" opacity="0.25" transform="rotate(-20,118,118)"/>
    <ellipse cx="116" cy="115" rx="4" ry="3" fill="white" opacity="0.4" transform="rotate(-20,116,115)"/>
    <!-- Gem outline -->
    <polygon points="128,102 162,120 162,152 128,170 94,152 94,120"
      fill="none" stroke="#c090ff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Gem sparkle rays -->
  <g stroke="#e0c8ff" stroke-width="1" opacity="0.5" filter="url(#softGlow)">
    <line x1="128" y1="92" x2="128" y2="78"/>
    <line x1="128" y1="180" x2="128" y2="194"/>
    <line x1="84" y1="114" x2="70" y2="106"/>
    <line x1="172" y1="114" x2="186" y2="106"/>
    <line x1="84" y1="158" x2="70" y2="166"/>
    <line x1="172" y1="158" x2="186" y2="166"/>
  </g>

  <!-- Bottom text: M rune -->
  <g fill="url(#goldGrad)" opacity="0.9" filter="url(#softGlow)">
    <!-- Stylized M letterform -->
    <path d="M96 196 L96 216 L102 216 L102 203 L110 212 L118 203 L118 216 L124 216 L124 196 L118 196 L110 207 L102 196 Z"/>
    <!-- Separator dots -->
    <circle cx="82" cy="206" r="2.5"/>
    <circle cx="76" cy="206" r="1.5"/>
    <circle cx="70" cy="206" r="1"/>
    <circle cx="174" cy="206" r="2.5"/>
    <circle cx="180" cy="206" r="1.5"/>
    <circle cx="186" cy="206" r="1"/>
    <!-- Small rune marks flanking M -->
    <rect x="130" y="198" width="1.5" height="18" rx="0.75"/>
    <rect x="135" y="202" width="1.5" height="10" rx="0.75"/>
    <rect x="140" y="200" width="1.5" height="14" rx="0.75"/>
    <rect x="145" y="204" width="1.5" height="8" rx="0.75"/>
    <rect x="150" y="201" width="1.5" height="12" rx="0.75"/>
    <rect x="60" y="198" width="1.5" height="18" rx="0.75"/>
    <rect x="55" y="202" width="1.5" height="10" rx="0.75"/>
    <rect x="50" y="200" width="1.5" height="14" rx="0.75"/>
    <rect x="45" y="204" width="1.5" height="8" rx="0.75"/>
  </g>
</svg>
