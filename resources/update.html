<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #04080f;
      color: #b8c4e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Icon + spinner ── */
    .icon-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 30px;
    }

    .app-icon {
      width: 88px;
      height: 88px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(80,140,255,0.35));
    }

    /* SVG spinner ring that orbits the icon */
    .spinner {
      position: absolute;
      inset: -13px;
      width: calc(100% + 26px);
      height: calc(100% + 26px);
      animation: orbit 1.3s linear infinite;
    }
    .spinner-track {
      fill: none;
      stroke: rgba(192,208,255,0.08);
      stroke-width: 2.5;
    }
    .spinner-head {
      fill: none;
      stroke: #c0d0ff;
      stroke-width: 2.5;
      stroke-dasharray: 58 215;
      stroke-linecap: round;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Text ── */
    .label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #3e4e72;
      margin-bottom: 6px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #eeeeff;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .status {
      font-size: 13px;
      color: #647ab0;
      letter-spacing: 0.03em;
      transition: color 0.6s ease, opacity 0.6s ease;
    }

    .status.done {
      color: #60c878;
    }

    /* Fade-in on load */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <!-- Spinner ring -->
      <svg class="spinner" viewBox="0 0 114 114">
        <circle class="spinner-track" cx="57" cy="57" r="54"/>
        <circle class="spinner-head"  cx="57" cy="57" r="54"/>
      </svg>

      <!-- Meridian icon, embedded inline -->
      <svg class="app-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
        <defs>
          <clipPath id="circle"><circle cx="128" cy="128" r="120"/></clipPath>
          <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
            <stop offset="0%" stop-color="#0a1430"/>
            <stop offset="100%" stop-color="#020408"/>
          </radialGradient>
          <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0d868"/>
            <stop offset="40%" stop-color="#c8a030"/>
            <stop offset="100%" stop-color="#e8c050"/>
          </linearGradient>
          <linearGradient id="crystalBody" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#b8e0ff"/>
            <stop offset="25%" stop-color="#4898e8"/>
            <stop offset="65%" stop-color="#1848a8"/>
            <stop offset="100%" stop-color="#0a2060"/>
          </linearGradient>
          <radialGradient id="crystalGlow" cx="42%" cy="28%" r="50%">
            <stop offset="0%" stop-color="#d0eeff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#d0eeff" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3080d8" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#3080d8" stop-opacity="0"/>
          </radialGradient>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="goldGlow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="sparkleGlow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g clip-path="url(#circle)">
          <rect width="256" height="256" fill="url(#bgGrad)"/>
          <ellipse cx="128" cy="128" rx="100" ry="100" fill="url(#outerGlow)"/>
          <polygon points="128,44 172,96 172,178 128,224 84,178 84,96" fill="#04101e" opacity="0.7" transform="translate(3,3)"/>
          <polygon points="128,44 84,96 84,178 128,144" fill="#0c2860"/>
          <polygon points="128,44 172,96 172,178 128,144" fill="#1040a8"/>
          <polygon points="128,144 84,178 128,224" fill="#081c50"/>
          <polygon points="128,144 172,178 128,224" fill="#0c2870"/>
          <polygon points="128,44 84,96 128,144 172,96" fill="url(#crystalBody)"/>
          <polygon points="84,96 172,96 160,110 96,110" fill="#2870d0" opacity="0.55"/>
          <polygon points="128,44 172,96 172,178 128,224 84,178 84,96" fill="url(#crystalGlow)" opacity="0.45"/>
          <line x1="128" y1="44" x2="128" y2="224" stroke="#90c8ff" stroke-width="0.7" opacity="0.25"/>
          <line x1="84" y1="96" x2="172" y2="178" stroke="#90c8ff" stroke-width="0.7" opacity="0.18"/>
          <line x1="172" y1="96" x2="84" y2="178" stroke="#90c8ff" stroke-width="0.7" opacity="0.18"/>
          <polygon points="128,44 172,96 172,178 128,224 84,178 84,96" fill="none" stroke="#70b0ff" stroke-width="1.5" opacity="0.65" filter="url(#softGlow)"/>
          <ellipse cx="110" cy="86" rx="16" ry="10" fill="white" opacity="0.32" transform="rotate(-22,110,86)"/>
          <ellipse cx="108" cy="82" rx="7" ry="4" fill="white" opacity="0.52" transform="rotate(-22,108,82)"/>
          <g stroke="#c8e8ff" stroke-width="1.3" opacity="0.75" filter="url(#sparkleGlow)">
            <line x1="128" y1="44" x2="128" y2="24"/>
            <line x1="128" y1="44" x2="116" y2="28"/>
            <line x1="128" y1="44" x2="140" y2="28"/>
            <line x1="128" y1="44" x2="108" y2="36"/>
            <line x1="128" y1="44" x2="148" y2="36"/>
          </g>
          <g stroke="#a0c8ff" stroke-width="0.9" opacity="0.45">
            <line x1="84" y1="96" x2="66" y2="84"/>
            <line x1="172" y1="96" x2="190" y2="84"/>
          </g>
          <g stroke="#80a8e0" stroke-width="0.8" opacity="0.35">
            <line x1="128" y1="224" x2="128" y2="240"/>
            <line x1="128" y1="224" x2="118" y2="236"/>
            <line x1="128" y1="224" x2="138" y2="236"/>
          </g>
        </g>
        <circle cx="128" cy="128" r="121" fill="none" stroke="#080e20" stroke-width="3"/>
        <circle cx="128" cy="128" r="120" fill="none" stroke="url(#goldFrame)" stroke-width="2.5" filter="url(#goldGlow)"/>
        <circle cx="128" cy="128" r="116" fill="none" stroke="#3a2c06" stroke-width="1" opacity="0.7"/>
        <g fill="#e8c040" filter="url(#goldGlow)">
          <circle cx="128" cy="8"   r="3"/>
          <circle cx="248" cy="128" r="3"/>
          <circle cx="128" cy="248" r="3"/>
          <circle cx="8"   cy="128" r="3"/>
        </g>
        <g stroke="url(#goldFrame)" stroke-width="1.5" opacity="0.6">
          <line x1="108" y1="12" x2="118" y2="14"/>
          <line x1="148" y1="12" x2="138" y2="14"/>
          <line x1="108" y1="244" x2="118" y2="242"/>
          <line x1="148" y1="244" x2="138" y2="242"/>
          <line x1="12" y1="108" x2="14" y2="118"/>
          <line x1="12" y1="148" x2="14" y2="138"/>
          <line x1="244" y1="108" x2="242" y2="118"/>
          <line x1="244" y1="148" x2="242" y2="138"/>
        </g>
      </svg>
    </div>

    <div class="label">Update</div>
    <div class="title">Meridian</div>
    <div class="status" id="status">Installing update…</div>
  </div>

  <script>
    // Transition status text to mirror the install → launch phases
    setTimeout(() => {
      const el = document.getElementById('status')
      el.style.opacity = '0'
      setTimeout(() => {
        el.textContent = 'Starting Meridian…'
        el.classList.add('done')
        el.style.opacity = '1'
      }, 350)
    }, 2200)
  </script>
</body>
</html>
