<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <clipPath id="circle">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a1430"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d868"/>
      <stop offset="40%" stop-color="#c8a030"/>
      <stop offset="100%" stop-color="#e8c050"/>
    </linearGradient>
    <linearGradient id="crystalBody" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#b8e0ff"/>
      <stop offset="25%" stop-color="#4898e8"/>
      <stop offset="65%" stop-color="#1848a8"/>
      <stop offset="100%" stop-color="#0a2060"/>
    </linearGradient>
    <radialGradient id="crystalGlow" cx="42%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#d0eeff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d0eeff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3080d8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3080d8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Clipped content — everything inside the circle -->
  <g clip-path="url(#circle)">

    <!-- Background -->
    <rect width="256" height="256" fill="url(#bgGrad)"/>

    <!-- Ambient glow behind crystal -->
    <ellipse cx="128" cy="128" rx="100" ry="100" fill="url(#outerGlow)"/>

    <!-- ── Crystal shape ── -->
    <!-- Shadow offset -->
    <polygon points="128,44 172,96 172,178 128,224 84,178 84,96"
      fill="#04101e" opacity="0.7" transform="translate(3,3)"/>

    <!-- Left face — dark -->
    <polygon points="128,44 84,96 84,178 128,144"
      fill="#0c2860"/>

    <!-- Right face — mid -->
    <polygon points="128,44 172,96 172,178 128,144"
      fill="#1040a8"/>

    <!-- Bottom-left face -->
    <polygon points="128,144 84,178 128,224"
      fill="#081c50"/>

    <!-- Bottom-right face -->
    <polygon points="128,144 172,178 128,224"
      fill="#0c2870"/>

    <!-- Top bright face -->
    <polygon points="128,44 84,96 128,144 172,96"
      fill="url(#crystalBody)"/>

    <!-- Upper band -->
    <polygon points="84,96 172,96 160,110 96,110"
      fill="#2870d0" opacity="0.55"/>

    <!-- Crystal glow overlay -->
    <polygon points="128,44 172,96 172,178 128,224 84,178 84,96"
      fill="url(#crystalGlow)" opacity="0.45"/>

    <!-- Facet edge lines -->
    <line x1="128" y1="44" x2="128" y2="224" stroke="#90c8ff" stroke-width="0.7" opacity="0.25"/>
    <line x1="84" y1="96" x2="172" y2="178" stroke="#90c8ff" stroke-width="0.7" opacity="0.18"/>
    <line x1="172" y1="96" x2="84" y2="178" stroke="#90c8ff" stroke-width="0.7" opacity="0.18"/>

    <!-- Crystal outline -->
    <polygon points="128,44 172,96 172,178 128,224 84,178 84,96"
      fill="none" stroke="#70b0ff" stroke-width="1.5" opacity="0.65" filter="url(#softGlow)"/>

    <!-- Specular highlight -->
    <ellipse cx="110" cy="86" rx="16" ry="10" fill="white" opacity="0.32" transform="rotate(-22,110,86)"/>
    <ellipse cx="108" cy="82" rx="7" ry="4" fill="white" opacity="0.52" transform="rotate(-22,108,82)"/>

    <!-- Sparkle rays from tip -->
    <g stroke="#c8e8ff" stroke-width="1.3" opacity="0.75" filter="url(#sparkleGlow)">
      <line x1="128" y1="44" x2="128" y2="24"/>
      <line x1="128" y1="44" x2="116" y2="28"/>
      <line x1="128" y1="44" x2="140" y2="28"/>
      <line x1="128" y1="44" x2="108" y2="36"/>
      <line x1="128" y1="44" x2="148" y2="36"/>
    </g>
    <!-- Side sparkle rays -->
    <g stroke="#a0c8ff" stroke-width="0.9" opacity="0.45">
      <line x1="84" y1="96" x2="66" y2="84"/>
      <line x1="172" y1="96" x2="190" y2="84"/>
    </g>
    <!-- Bottom rays -->
    <g stroke="#80a8e0" stroke-width="0.8" opacity="0.35">
      <line x1="128" y1="224" x2="128" y2="240"/>
      <line x1="128" y1="224" x2="118" y2="236"/>
      <line x1="128" y1="224" x2="138" y2="236"/>
    </g>

  </g>

  <!-- ── Circular border frame ── -->
  <!-- Outer dark ring -->
  <circle cx="128" cy="128" r="121" fill="none" stroke="#080e20" stroke-width="3"/>
  <!-- Gold border -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#goldFrame)" stroke-width="2.5" filter="url(#goldGlow)"/>
  <!-- Inner separation ring -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="#3a2c06" stroke-width="1" opacity="0.7"/>

  <!-- Corner ornament dots at cardinal points -->
  <g fill="#e8c040" filter="url(#goldGlow)">
    <circle cx="128" cy="8"   r="3"/>
    <circle cx="248" cy="128" r="3"/>
    <circle cx="128" cy="248" r="3"/>
    <circle cx="8"   cy="128" r="3"/>
  </g>
  <!-- Diagonal tick lines -->
  <g stroke="url(#goldFrame)" stroke-width="1.5" opacity="0.6">
    <line x1="108" y1="12" x2="118" y2="14"/>
    <line x1="148" y1="12" x2="138" y2="14"/>
    <line x1="108" y1="244" x2="118" y2="242"/>
    <line x1="148" y1="244" x2="138" y2="242"/>
    <line x1="12" y1="108" x2="14" y2="118"/>
    <line x1="12" y1="148" x2="14" y2="138"/>
    <line x1="244" y1="108" x2="242" y2="118"/>
    <line x1="244" y1="148" x2="242" y2="138"/>
  </g>
</svg>
