name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.new_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v*" --sort=-version:refname | head -1)
          echo "tag=${LATEST:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Get merged PR labels
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const labels = prs.data.flatMap(pr => pr.labels.map(l => l.name));
            core.setOutput('labels', labels.join(','));

      - name: Compute new tag
        id: new_tag
        run: |
          VERSION="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          LABELS="${{ steps.pr.outputs.labels }}"
          if echo "$LABELS" | grep -q "release:major"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$LABELS" | grep -q "release:minor"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.new_tag.outputs.tag }}
          git push origin ${{ steps.new_tag.outputs.tag }}

  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_pattern: "dist/*.exe"
          - os: macos-latest
            artifact_pattern: "dist/*.dmg"
          - os: ubuntu-latest
            artifact_pattern: "dist/*.AppImage"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Meridian ${{ needs.tag.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
